<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco-School High - Tacho IA</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/login.css">
</head>
<body>
    <div class="login-page">
        <div class="login-card glass-card-static">
            <!-- Logo -->
            <div class="login-logo">
                <div class="login-logo-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 2,11.5 2,13.5C2,15.5 3.75,17.25 3.75,17.25C7,8 17,8 17,8Z"/>
                    </svg>
                </div>
                <div class="login-logo-text">
                    ECO-SCHOOL<br><span>HIGH</span>
                </div>
            </div>

            <p class="login-subtitle">Plataforma de Reciclaje Escolar con IA</p>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" data-tab="tab-student">Estudiante / Docente</button>
                <button class="tab-btn" data-tab="tab-admin">Administrador</button>
            </div>

            <!-- Alert container -->
            <div id="login-alert" class="alert" role="alert">
                <span id="alert-icon"></span>
                <span id="alert-message"></span>
            </div>

            <!-- Student/Teacher Login -->
            <div class="tab-content active" id="tab-student">
                <form id="form-student" onsubmit="return handleLogin(event, 'student')">
                    <div class="form-group">
                        <label for="student-dni">DNI</label>
                        <input type="text" id="student-dni" class="form-input" placeholder="Ingrese su DNI" required maxlength="10" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="student-password">Contrasena</label>
                        <input type="password" id="student-password" class="form-input" placeholder="Ingrese su contrasena" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Ingresar</button>
                </form>
            </div>

            <!-- Admin Login -->
            <div class="tab-content" id="tab-admin">
                <form id="form-admin" onsubmit="return handleLogin(event, 'admin')">
                    <div class="form-group">
                        <label for="admin-user">Usuario Admin</label>
                        <input type="text" id="admin-user" class="form-input" placeholder="admin@eco-school" required autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="admin-password">Contrasena</label>
                        <input type="password" id="admin-password" class="form-input" placeholder="Contrasena de administrador" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Acceder como Admin</button>
                </form>
            </div>

            <!-- Separator & Quick Access -->
            <div class="separator">o acceso rapido</div>
            <div class="quick-access">
                <a href="v_tacho_simulador/tacho_simulador.html">Ir al Tacho Simulador</a>
            </div>

            <div class="login-footer">
                <p>Eco-School High &copy; 2025 &mdash; Reciclaje Inteligente</p>
            </div>
        </div>
    </div>

    <script src="assets/js/config.js"></script>
    <script>
        // Tab switching logic
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab).classList.add('active');
                hideAlert();
            });
        });

        // Alert functions
        function showAlert(type, message) {
            const alert = document.getElementById('login-alert');
            const icon = document.getElementById('alert-icon');
            const msg = document.getElementById('alert-message');
            alert.className = `alert alert-${type} show`;
            icon.textContent = type === 'success' ? '\u2713' : type === 'error' ? '\u2717' : '\u24D8';
            msg.textContent = message;
            setTimeout(() => hideAlert(), 5000);
        }

        function hideAlert() {
            const alert = document.getElementById('login-alert');
            alert.classList.remove('show');
        }

        // Login handler
        async function handleLogin(e, role) {
            e.preventDefault();

            const formData = new FormData();

            if (role === 'student') {
                const dni = document.getElementById('student-dni').value.trim();
                const contrasena = document.getElementById('student-password').value;
                formData.append('dni', dni);
                formData.append('contrasena', contrasena);
            } else {
                const correo = document.getElementById('admin-user').value.trim();
                const contrasena = document.getElementById('admin-password').value;
                formData.append('correo', correo);
                formData.append('contrasena', contrasena);
            }

            try {
                const res = await fetch(`${CONFIG.API_BASE_URL}${CONFIG.ENDPOINTS.LOGIN}`, {
                    method: 'POST',
                    body: formData
                });

                const data = await res.json();

                if (res.ok && data.usuario_id) {
                    showAlert('success', `Bienvenido/a ${data.nombre}. Redirigiendo...`);
                    sessionStorage.setItem('eco_user', JSON.stringify(data));
                    localStorage.setItem('eco_user', JSON.stringify(data));

                    setTimeout(() => {
                        if (data.rol === 'director') {
                            window.location.href = 'v_administrador/dashboard.html';
                        } else if (data.rol === 'docente') {
                            window.location.href = 'v_docente/dashboard.html';
                        } else {
                            window.location.href = 'v_estudiante/dashboard.html';
                        }
                    }, 1000);
                } else {
                    showAlert('error', data.detail || 'Credenciales incorrectas');
                }
            } catch (err) {
                showAlert('error', 'Error de conexion. Intente nuevamente.');
                console.error('Login error:', err);
            }

            return false;
        }
    </script>
</body>
</html>
