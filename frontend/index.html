<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco-School High - Tacho IA</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            position: relative;
            overflow: hidden;
        }

        .login-page::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(129, 199, 132, 0.15) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(46, 125, 50, 0.08) 0%, transparent 50%);
            animation: floatBg 20s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes floatBg {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, -1%) rotate(1deg); }
            66% { transform: translate(-1%, 2%) rotate(-1deg); }
        }

        .login-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 2.5rem 2rem;
        }

        .login-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .login-logo-icon {
            width: 48px;
            height: 48px;
            background: var(--eco-primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-logo-icon svg {
            width: 28px;
            height: 28px;
            fill: #fff;
        }

        .login-logo-text {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--eco-primary-dark);
            line-height: 1.1;
        }

        .login-logo-text span {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--eco-text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .login-subtitle {
            text-align: center;
            color: var(--eco-text-muted);
            font-size: 0.9rem;
            margin-bottom: 1.75rem;
        }

        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--eco-text-muted);
        }

        .login-footer a {
            color: var(--eco-primary);
            font-weight: 600;
        }

        .separator {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 1.25rem 0;
            color: var(--eco-text-muted);
            font-size: 0.8rem;
        }

        .separator::before,
        .separator::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #d0e8d0;
        }

        .quick-access {
            text-align: center;
        }

        .quick-access a {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--eco-primary);
            padding: 0.5rem 1rem;
            border-radius: var(--eco-radius-sm);
            transition: var(--eco-transition);
        }

        .quick-access a:hover {
            background: var(--eco-success-light);
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-card glass-card-static">
            <!-- Logo -->
            <div class="login-logo">
                <div class="login-logo-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 2,11.5 2,13.5C2,15.5 3.75,17.25 3.75,17.25C7,8 17,8 17,8Z"/>
                    </svg>
                </div>
                <div class="login-logo-text">
                    ECO-SCHOOL<br><span>HIGH</span>
                </div>
            </div>

            <p class="login-subtitle">Plataforma de Reciclaje Escolar con IA</p>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" data-tab="tab-student">Estudiante / Docente</button>
                <button class="tab-btn" data-tab="tab-admin">Administrador</button>
            </div>

            <!-- Alert container -->
            <div id="login-alert" class="alert" role="alert">
                <span id="alert-icon"></span>
                <span id="alert-message"></span>
            </div>

            <!-- Student/Teacher Login -->
            <div class="tab-content active" id="tab-student">
                <form id="form-student" onsubmit="return handleLogin(event, 'student')">
                    <div class="form-group">
                        <label for="student-dni">DNI</label>
                        <input type="text" id="student-dni" class="form-input" placeholder="Ingrese su DNI" required maxlength="10" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="student-password">Contrasena</label>
                        <input type="password" id="student-password" class="form-input" placeholder="Ingrese su contrasena" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Ingresar</button>
                </form>
            </div>

            <!-- Admin Login -->
            <div class="tab-content" id="tab-admin">
                <form id="form-admin" onsubmit="return handleLogin(event, 'admin')">
                    <div class="form-group">
                        <label for="admin-user">Usuario Admin</label>
                        <input type="text" id="admin-user" class="form-input" placeholder="admin@eco-school" required autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="admin-password">Contrasena</label>
                        <input type="password" id="admin-password" class="form-input" placeholder="Contrasena de administrador" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Acceder como Admin</button>
                </form>
            </div>

            <!-- Separator & Quick Access -->
            <div class="separator">o acceso rapido</div>
            <div class="quick-access">
                <a href="v_tacho_simulador/tacho_simulador.html">Ir al Tacho Simulador</a>
            </div>

            <div class="login-footer">
                <p>Eco-School High &copy; 2025 &mdash; Reciclaje Inteligente</p>
            </div>
        </div>
    </div>

    <script src="assets/js/config.js"></script>
    <script>
        // Tab switching logic
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab).classList.add('active');
                hideAlert();
            });
        });

        // Alert functions
        function showAlert(type, message) {
            const alert = document.getElementById('login-alert');
            const icon = document.getElementById('alert-icon');
            const msg = document.getElementById('alert-message');
            alert.className = `alert alert-${type} show`;
            icon.textContent = type === 'success' ? '\u2713' : type === 'error' ? '\u2717' : '\u24D8';
            msg.textContent = message;
            setTimeout(() => hideAlert(), 5000);
        }

        function hideAlert() {
            const alert = document.getElementById('login-alert');
            alert.classList.remove('show');
        }

        // Login handler
        async function handleLogin(e, role) {
            e.preventDefault();

            const formData = new FormData();

            if (role === 'student') {
                const dni = document.getElementById('student-dni').value.trim();
                const contrasena = document.getElementById('student-password').value;
                formData.append('dni', dni);
                formData.append('contrasena', contrasena);
            } else {
                const correo = document.getElementById('admin-user').value.trim();
                const contrasena = document.getElementById('admin-password').value;
                formData.append('correo', correo);
                formData.append('contrasena', contrasena);
            }

            try {
                const res = await fetch(`${CONFIG.API_BASE_URL}${CONFIG.ENDPOINTS.LOGIN}`, {
                    method: 'POST',
                    body: formData
                });

                const data = await res.json();

                if (res.ok && data.usuario_id) {
                    showAlert('success', `Bienvenido/a ${data.nombre}. Redirigiendo...`);
                    localStorage.setItem('eco_user', JSON.stringify(data));

                    setTimeout(() => {
                        if (data.rol === 'director') {
                            window.location.href = 'v_administrador/admin_dashboard.html';
                        } else if (data.rol === 'docente') {
                            window.location.href = 'v_docente/docente_dashboard.html';
                        } else {
                            window.location.href = 'v_estudiante/estudiante_dashboard.html';
                        }
                    }, 1000);
                } else {
                    showAlert('error', data.detail || 'Credenciales incorrectas');
                }
            } catch (err) {
                showAlert('error', 'Error de conexion. Intente nuevamente.');
                console.error('Login error:', err);
            }

            return false;
        }
    </script>
</body>
</html>
