<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tacho IA - Iniciar Sesion</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/login.css">
</head>
<body>
    <div class="login-page">
        <!-- Left: Illustrative Panel -->
        <div class="login-left">
            <!-- Animated particles -->
            <div class="particles">
                <span></span><span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span><span></span>
            </div>
            <!-- Recycle SVG Icon -->
            <div class="login-illustration">
                <svg class="recycle-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <path d="M50 15 L35 40 L25 35 L40 60 L55 35 L45 40 Z" fill="rgba(76,175,80,0.9)"/>
                    <path d="M70 55 L80 40 L85 50 L60 50 L70 70 L65 60 Z" fill="rgba(76,175,80,0.7)"/>
                    <path d="M30 55 L20 70 L25 60 L40 75 L30 75 L45 55 Z" fill="rgba(76,175,80,0.8)"/>
                    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="30s" repeatCount="indefinite"/>
                </svg>
            </div>
            <div class="login-brand">
                <h1>TACHO IA</h1>
                <p>Inteligencia que transforma</p>
                <span class="brand-tagline">Sistema inteligente de clasificacion de residuos</span>
            </div>
        </div>

        <!-- Right: Form Card -->
        <div class="login-right">
            <div class="login-card">
                <div class="card-header">
                    <h2 class="login-title">Iniciar sesion</h2>
                    <p class="login-subtitle">Accede a tu cuenta</p>
                </div>

                <!-- Tabs -->
                <div class="login-tabs">
                    <button class="tab-btn active" data-tab="tab-student">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        Estudiante / Docente
                    </button>
                    <button class="tab-btn" data-tab="tab-admin">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                        Director
                    </button>
                </div>

                <!-- Alert container -->
                <div id="login-alert" class="alert" role="alert">
                    <span id="alert-icon"></span>
                    <span id="alert-message"></span>
                </div>

                <!-- Student/Teacher Login -->
                <div class="tab-content active" id="tab-student">
                    <form id="form-student" onsubmit="return handleLogin(event, 'student')">
                        <div class="form-group">
                            <div class="input-icon-wrapper">
                                <span class="input-icon">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                                </span>
                                <div class="input-content">
                                    <label for="student-dni">Usuario</label>
                                    <input type="text" id="student-dni" class="form-input" placeholder="Ingresa tu usuario" required maxlength="10" autocomplete="off">
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <div class="input-icon-wrapper">
                                <span class="input-icon">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                                </span>
                                <div class="input-content">
                                    <label for="student-password">Contrasena</label>
                                    <input type="password" id="student-password" class="form-input" placeholder="Ingresa tu contrasena" required>
                                </div>
                                <button type="button" class="toggle-password" onclick="togglePwd('student-password', this)" aria-label="Mostrar contrasena">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                </button>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block btn-login">
                            <span>Iniciar sesion</span>
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                        </button>
                    </form>
                </div>

                <!-- Admin Login -->
                <div class="tab-content" id="tab-admin">
                    <form id="form-admin" onsubmit="return handleLogin(event, 'admin')">
                        <div class="form-group">
                            <div class="input-icon-wrapper">
                                <span class="input-icon">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                                </span>
                                <div class="input-content">
                                    <label for="admin-user">Usuario</label>
                                    <input type="text" id="admin-user" class="form-input" placeholder="Ingresa tu usuario" required autocomplete="off">
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <div class="input-icon-wrapper">
                                <span class="input-icon">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                                </span>
                                <div class="input-content">
                                    <label for="admin-password">Contrasena</label>
                                    <input type="password" id="admin-password" class="form-input" placeholder="Ingresa tu contrasena" required>
                                </div>
                                <button type="button" class="toggle-password" onclick="togglePwd('admin-password', this)" aria-label="Mostrar contrasena">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                </button>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block btn-login">
                            <span>Iniciar sesion</span>
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                        </button>
                    </form>
                </div>

                <!-- Quick Access -->
                <div class="login-quick-access">
                    <a href="v_tacho_simulador/tacho_simulador.html" class="quick-access-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                        <span>Ir al Tacho Simulador</span>
                    </a>
                </div>

                <!-- Footer -->
                <div class="login-footer">
                    <p>No tienes cuenta?</p>
                    <a href="#">Contacta al administrador</a>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/config.js"></script>
    <script>
        // Tab switching logic
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab).classList.add('active');
                hideAlert();
            });
        });

        // Alert functions
        function showAlert(type, message) {
            const alert = document.getElementById('login-alert');
            const icon = document.getElementById('alert-icon');
            const msg = document.getElementById('alert-message');
            alert.className = `alert alert-${type} show`;
            icon.textContent = type === 'success' ? '\u2713' : type === 'error' ? '\u2717' : '\u24D8';
            msg.textContent = message;
            setTimeout(() => hideAlert(), 5000);
        }

        function hideAlert() {
            const alert = document.getElementById('login-alert');
            alert.classList.remove('show');
        }

        // Login handler
        async function handleLogin(e, role) {
            e.preventDefault();

            const formData = new FormData();

            if (role === 'student') {
                const dni = document.getElementById('student-dni').value.trim();
                const contrasena = document.getElementById('student-password').value;
                formData.append('dni', dni);
                formData.append('contrasena', contrasena);
            } else {
                const correo = document.getElementById('admin-user').value.trim();
                const contrasena = document.getElementById('admin-password').value;
                formData.append('correo', correo);
                formData.append('contrasena', contrasena);
            }

            try {
                const res = await fetch(`${CONFIG.API_BASE_URL}${CONFIG.ENDPOINTS.LOGIN}`, {
                    method: 'POST',
                    body: formData
                });

                const data = await res.json();

                if (res.ok && data.usuario_id) {
                    showAlert('success', `Bienvenido/a ${data.nombre}. Redirigiendo...`);
                    sessionStorage.setItem('eco_user', JSON.stringify(data));
                    localStorage.setItem('eco_user', JSON.stringify(data));

                    setTimeout(() => {
                        if (data.rol === 'director') {
                            window.location.href = 'v_administrador/dashboard.html';
                        } else if (data.rol === 'docente') {
                            window.location.href = 'v_docente/dashboard.html';
                        } else {
                            window.location.href = 'v_estudiante/dashboard.html';
                        }
                    }, 1000);
                } else {
                    showAlert('error', data.detail || 'Credenciales incorrectas');
                }
            } catch (err) {
                showAlert('error', 'Error de conexion. Intente nuevamente.');
                console.error('Login error:', err);
            }

            return false;
        }

        // Toggle password visibility
        function togglePwd(inputId, btn) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = '\u{1F441}\uFE0F';
            } else {
                input.type = 'password';
                btn.textContent = '\u{1F441}';
            }
        }
    </script>
</body>
</html>
