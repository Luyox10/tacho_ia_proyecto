<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Alumnos - Eco-School High</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/administrador/gestion_alumnos.css">
</head>
<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-logo">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 2,11.5 2,13.5C2,15.5 3.75,17.25 3.75,17.25C7,8 17,8 17,8Z"/></svg>
                <span>ECO-SCHOOL</span>
            </div>
            <a href="dashboard.html" class="sidebar-link"><span class="sidebar-icon">&#9632;</span> Global Dashboard</a>
            <a href="gestion_alumnos.html" class="sidebar-link active"><span class="sidebar-icon">&#128101;</span> Manage Students</a>
            <a href="gestion_tutores.html" class="sidebar-link"><span class="sidebar-icon">&#128188;</span> Assign Tutors</a>
            <a href="auditoria_docente.html" class="sidebar-link"><span class="sidebar-icon">&#128203;</span> Teacher Audit Log</a>
            <div style="margin-top: auto; padding-top: 2rem;">
                <a href="#" onclick="cerrarSesion(); return false;" class="sidebar-link" style="color: #ef9a9a;"><span class="sidebar-icon">&#9211;</span> Cerrar Sesión</a>
            </div>
        </nav>

        <main class="admin-main">
            <div class="page-header">
                <h2>Manage Students</h2>
                <button class="btn btn-primary" onclick="openModal()">+ Register New Student</button>
            </div>

            <div class="crud-card glass-card-static">
                <div class="table-toolbar">
                    <input type="text" class="search-input" id="search-input" placeholder="Search by DNI or name..." oninput="filterTable()">
                    <span style="font-size: 0.8rem; color: var(--eco-text-muted);" id="total-label">0 students</span>
                </div>
                <div class="table-wrapper">
                    <table class="crud-table">
                        <thead>
                            <tr>
                                <th>DNI</th>
                                <th>Name</th>
                                <th>Last Name</th>
                                <th>Grade/Section</th>
                                <th>Points</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="students-body">
                            <tr><td colspan="6" style="text-align:center; padding:2rem; color:var(--eco-text-muted);">Cargando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal: Register/Edit Student -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div class="modal-title" id="modal-title">REGISTER NEW STUDENT</div>
            <form id="student-form">
                <input type="hidden" id="edit-id" value="">
                <div class="form-group">
                    <label for="f-dni">DNI</label>
                    <input type="text" id="f-dni" class="form-input" placeholder="DNI" required maxlength="10">
                </div>
                <div class="form-group">
                    <label for="f-nombre">First Name</label>
                    <input type="text" id="f-nombre" class="form-input" placeholder="First Name" required>
                </div>
                <div class="form-group">
                    <label for="f-apellido">Last Name</label>
                    <input type="text" id="f-apellido" class="form-input" placeholder="Last Name" required>
                </div>
                <div class="form-group">
                    <label for="f-grado">Grade/Section</label>
                    <select id="f-grado" class="form-input" required>
                        <option value="">Select...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="f-contrasena">Password <span id="pwd-hint" style="font-size:0.75rem;color:var(--eco-text-muted);font-weight:400;">(required for new student)</span></label>
                    <input type="password" id="f-contrasena" class="form-input" placeholder="Set password" autocomplete="new-password">
                    <small style="color:var(--eco-text-muted);font-size:0.75rem;">Leave blank when editing to keep existing password.</small>
                </div>
                <div id="form-error" style="display:none;padding:0.5rem 0.75rem;background:#ffebee;color:#c62828;border-radius:6px;font-size:0.82rem;margin-bottom:0.5rem;"></div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Student</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../assets/js/config.js"></script>
    <script>
        // Session verification
        const user = JSON.parse(sessionStorage.getItem('eco_user') || localStorage.getItem('eco_user') || '{}');
        if (!user.usuario_id || user.rol !== 'director') {
            window.location.href = '../index.html';
        }

        function cerrarSesion() {
            sessionStorage.clear();
            localStorage.removeItem('eco_user');
            window.location.href = '../index.html';
        }

        let allStudents = [];
        let allAulas = [];

        async function loadData() {
            try {
                // Fetch real alumnos and aulas from DB
                const [resAlumnos, resDirector] = await Promise.all([
                    fetch(`${CONFIG.API_BASE_URL}/api/admin/alumnos`),
                    fetch(`${CONFIG.API_BASE_URL}/api/dashboard/director`)
                ]);
                const dataAlumnos = await resAlumnos.json();
                const dataDirector = await resDirector.json();

                allAulas = dataDirector.ranking_aulas || [];

                // Populate grade select
                const select = document.getElementById('f-grado');
                select.innerHTML = '<option value="">Select...</option>' +
                    allAulas.map(a => `<option value="${a.id}">${a.grado_seccion}</option>`).join('');

                // Map real alumnos from database
                allStudents = (dataAlumnos.alumnos || []).map(a => ({
                    id: a.id,
                    dni: a.dni || '--',
                    nombre: a.nombre || '--',
                    apellido: a.apellido || '',
                    aula_id: a.aula_id,
                    grado_seccion: a.grado_seccion || 'Sin aula',
                    puntos: a.puntos || 0
                }));

                renderTable(allStudents);
            } catch (err) {
                console.error('Load error:', err);
            }
        }

        function renderTable(students) {
            const body = document.getElementById('students-body');
            document.getElementById('total-label').textContent = `${students.length} students`;

            if (students.length === 0) {
                body.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:2rem;">No students found</td></tr>';
                return;
            }

            body.innerHTML = students.map(s => `
                <tr>
                    <td>${s.dni || '--'}</td>
                    <td>${s.nombre}</td>
                    <td>${s.apellido}</td>
                    <td>${s.grado_seccion}</td>
                    <td><strong>${s.puntos || 0}</strong> pts</td>
                    <td>
                        <div class="table-actions">
                            <button class="action-btn edit" onclick="editStudent(${s.id})">Edit</button>
                            <button class="action-btn delete" onclick="deleteStudent(${s.id})">Delete</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function filterTable() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = allStudents.filter(s =>
                (s.dni || '').toLowerCase().includes(query) ||
                s.nombre.toLowerCase().includes(query) ||
                s.apellido.toLowerCase().includes(query)
            );
            renderTable(filtered);
        }

        function openModal(student = null) {
            document.getElementById('modal-overlay').classList.add('show');
            document.getElementById('form-error').style.display = 'none';
            const pwdInput = document.getElementById('f-contrasena');
            const pwdHint  = document.getElementById('pwd-hint');
            if (student) {
                document.getElementById('modal-title').textContent = 'EDIT STUDENT';
                document.getElementById('edit-id').value = student.id;
                document.getElementById('f-dni').value = student.dni || '';
                document.getElementById('f-dni').readOnly = true;
                document.getElementById('f-nombre').value = student.nombre;
                document.getElementById('f-apellido').value = student.apellido;
                document.getElementById('f-grado').value = student.aula_id || '';
                pwdInput.required = false;
                pwdInput.value = '';
                pwdHint.textContent = '(leave blank to keep current password)';
            } else {
                document.getElementById('modal-title').textContent = 'REGISTER NEW STUDENT';
                document.getElementById('student-form').reset();
                document.getElementById('edit-id').value = '';
                document.getElementById('f-dni').readOnly = false;
                pwdInput.required = true;
                pwdHint.textContent = '(required for new student)';
            }
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('show');
        }

        function editStudent(id) {
            const student = allStudents.find(s => s.id === id);
            if (student) openModal(student);
        }

        async function deleteStudent(id) {
            if (!confirm('Are you sure you want to remove this student? This will also delete their records.')) return;
            try {
                const res = await fetch(`${CONFIG.API_BASE_URL}/api/admin/alumnos/${id}`, {
                    method: 'DELETE'
                });
                if (!res.ok) {
                    const err = await res.json();
                    alert('Error: ' + (err.detail || 'Could not delete student.'));
                    return;
                }
                allStudents = allStudents.filter(s => s.id !== id);
                renderTable(allStudents);
            } catch (err) {
                alert('Network error: ' + err.message);
            }
        }

        async function saveStudent(e) {
            const editId     = document.getElementById('edit-id').value;
            const dni        = document.getElementById('f-dni').value.trim();
            const nombre     = document.getElementById('f-nombre').value.trim();
            const apellido   = document.getElementById('f-apellido').value.trim();
            const aula_id    = document.getElementById('f-grado').value;
            const contrasena = document.getElementById('f-contrasena').value;
            const errorBox   = document.getElementById('form-error');

            errorBox.style.display = 'none';

            // Validar contraseña obligatoria al crear
            if (!editId && !contrasena) {
                errorBox.textContent = 'Password is required for new students.';
                errorBox.style.display = 'block';
                return false;
            }

            const formData = new FormData();
            formData.append('nombre', nombre);
            formData.append('apellido', apellido);
            formData.append('aula_id', aula_id);
            if (contrasena) formData.append('contrasena_hash', contrasena);

            try {
                let res;
                if (editId) {
                    // Editar alumno existente (PUT)
                    res = await fetch(`${CONFIG.API_BASE_URL}/api/admin/alumnos/${editId}`, {
                        method: 'PUT',
                        body: formData
                    });
                } else {
                    // Crear nuevo alumno (POST) — siempre rol alumno
                    formData.append('dni', dni);
                    res = await fetch(`${CONFIG.API_BASE_URL}/api/admin/alumnos`, {
                        method: 'POST',
                        body: formData
                    });
                }

                if (!res.ok) {
                    const err = await res.json();
                    errorBox.textContent = 'Error: ' + (err.detail || 'Could not save student.');
                    errorBox.style.display = 'block';
                    return false;
                }

                // Recargar la tabla desde la API
                await loadData();
                closeModal();
            } catch (err) {
                errorBox.textContent = 'Network error: ' + err.message;
                errorBox.style.display = 'block';
            }
        }

        // Submit del formulario (async — no usar onsubmit inline con return)
        document.getElementById('student-form').addEventListener('submit', (e) => {
            e.preventDefault();
            saveStudent(e);
        });

        // Close modal on overlay click
        document.getElementById('modal-overlay').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeModal();
        });

        loadData();
    </script>
</body>
</html>
