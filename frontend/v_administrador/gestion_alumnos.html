<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Alumnos - Eco-School High</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <style>
        .admin-layout {
            display: grid;
            grid-template-columns: 220px 1fr;
            min-height: 100vh;
        }

        .sidebar {
            background: rgba(26, 58, 42, 0.92);
            backdrop-filter: blur(12px);
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 2rem;
            padding: 0 0.5rem;
        }

        .sidebar-logo svg { width: 28px; height: 28px; fill: #fff; }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: var(--eco-radius-sm);
            transition: var(--eco-transition);
            text-decoration: none;
        }

        .sidebar-link:hover, .sidebar-link.active {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .sidebar-link.active {
            background: rgba(76, 175, 80, 0.2);
            color: #81c784;
        }

        .sidebar-icon { font-size: 1.1rem; }

        .admin-main {
            padding: 2rem;
            overflow-y: auto;
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .page-header h2 { font-size: 1.5rem; }

        /* Table styles */
        .crud-card {
            padding: 1.5rem;
        }

        .table-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .search-input {
            padding: 0.5rem 1rem;
            border: 1.5px solid #d0e8d0;
            border-radius: var(--eco-radius-sm);
            font-size: 0.85rem;
            width: 260px;
            max-width: 100%;
            outline: none;
            transition: var(--eco-transition);
        }

        .search-input:focus {
            border-color: var(--eco-primary);
            box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.1);
        }

        .crud-table {
            width: 100%;
            border-collapse: collapse;
        }

        .crud-table th {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--eco-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 0.7rem 0.75rem;
            text-align: left;
            border-bottom: 2px solid #e0e8e0;
        }

        .crud-table td {
            font-size: 0.85rem;
            padding: 0.7rem 0.75rem;
            border-bottom: 1px solid #f0f4f0;
            color: var(--eco-text);
        }

        .crud-table tr:hover {
            background: rgba(46, 125, 50, 0.02);
        }

        .table-actions {
            display: flex;
            gap: 0.4rem;
        }

        .action-btn {
            padding: 0.3rem 0.6rem;
            font-size: 0.75rem;
            font-weight: 600;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: var(--eco-transition);
        }

        .action-btn.edit {
            background: #e3f2fd;
            color: #1565c0;
        }

        .action-btn.edit:hover { background: #bbdefb; }

        .action-btn.delete {
            background: #ffebee;
            color: #d32f2f;
        }

        .action-btn.delete:hover { background: #ffcdd2; }

        .table-wrapper { overflow-x: auto; }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 1rem;
        }

        .modal-overlay.show {
            display: flex;
            animation: fadeIn 0.2s ease;
        }

        .modal {
            background: #fff;
            border-radius: var(--eco-radius);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 440px;
            padding: 2rem;
            position: relative;
        }

        .modal-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--eco-text);
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 32px;
            height: 32px;
            border: none;
            background: #f5f5f5;
            border-radius: 50%;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--eco-transition);
        }

        .modal-close:hover { background: #e0e0e0; }

        .modal-actions {
            display: flex;
            gap: 0.75rem;
            justify-content: flex-end;
            margin-top: 1.5rem;
        }

        .btn-cancel {
            padding: 0.6rem 1.25rem;
            font-size: 0.85rem;
            font-weight: 600;
            background: #f5f5f5;
            border: none;
            border-radius: var(--eco-radius-sm);
            cursor: pointer;
            color: var(--eco-text);
            transition: var(--eco-transition);
        }

        .btn-cancel:hover { background: #e0e0e0; }

        @media (max-width: 900px) {
            .admin-layout { grid-template-columns: 1fr; }
            .sidebar {
                flex-direction: row;
                overflow-x: auto;
                padding: 1rem;
            }
            .sidebar-logo { display: none; }
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-logo">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 2,11.5 2,13.5C2,15.5 3.75,17.25 3.75,17.25C7,8 17,8 17,8Z"/></svg>
                <span>ECO-SCHOOL</span>
            </div>
            <a href="dashboard.html" class="sidebar-link"><span class="sidebar-icon">&#9632;</span> Global Dashboard</a>
            <a href="gestion_alumnos.html" class="sidebar-link active"><span class="sidebar-icon">&#128101;</span> Manage Students</a>
            <a href="gestion_tutores.html" class="sidebar-link"><span class="sidebar-icon">&#128188;</span> Assign Tutors</a>
            <a href="auditoria_docente.html" class="sidebar-link"><span class="sidebar-icon">&#128203;</span> Teacher Audit Log</a>
        </nav>

        <main class="admin-main">
            <div class="page-header">
                <h2>Manage Students</h2>
                <button class="btn btn-primary" onclick="openModal()">+ Register New Student</button>
            </div>

            <div class="crud-card glass-card-static">
                <div class="table-toolbar">
                    <input type="text" class="search-input" id="search-input" placeholder="Search by DNI or name..." oninput="filterTable()">
                    <span style="font-size: 0.8rem; color: var(--eco-text-muted);" id="total-label">0 students</span>
                </div>
                <div class="table-wrapper">
                    <table class="crud-table">
                        <thead>
                            <tr>
                                <th>DNI</th>
                                <th>Name</th>
                                <th>Last Name</th>
                                <th>Grade/Section</th>
                                <th>Points</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="students-body">
                            <tr><td colspan="6" style="text-align:center; padding:2rem; color:var(--eco-text-muted);">Cargando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal: Register/Edit Student -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div class="modal-title" id="modal-title">REGISTER NEW STUDENT</div>
            <form id="student-form" onsubmit="return saveStudent(event)">
                <input type="hidden" id="edit-id" value="">
                <div class="form-group">
                    <label for="f-dni">DNI</label>
                    <input type="text" id="f-dni" class="form-input" placeholder="DNI" required maxlength="10">
                </div>
                <div class="form-group">
                    <label for="f-nombre">First Name</label>
                    <input type="text" id="f-nombre" class="form-input" placeholder="First Name" required>
                </div>
                <div class="form-group">
                    <label for="f-apellido">Last Name</label>
                    <input type="text" id="f-apellido" class="form-input" placeholder="Last Name" required>
                </div>
                <div class="form-group">
                    <label for="f-grado">Grade/Section</label>
                    <select id="f-grado" class="form-input" required>
                        <option value="">Select...</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Student</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../assets/js/config.js"></script>
    <script>
        // Session verification
        const user = JSON.parse(sessionStorage.getItem('eco_user') || localStorage.getItem('eco_user') || '{}');
        if (!user.usuario_id || user.rol !== 'director') {
            window.location.href = '../index.html';
        }

        let allStudents = [];
        let allAulas = [];

        async function loadData() {
            try {
                // Fetch real alumnos and aulas from DB
                const [resAlumnos, resDirector] = await Promise.all([
                    fetch(`${CONFIG.API_BASE_URL}/api/admin/alumnos`),
                    fetch(`${CONFIG.API_BASE_URL}/api/dashboard/director`)
                ]);
                const dataAlumnos = await resAlumnos.json();
                const dataDirector = await resDirector.json();

                allAulas = dataDirector.ranking_aulas || [];

                // Populate grade select
                const select = document.getElementById('f-grado');
                select.innerHTML = '<option value="">Select...</option>' +
                    allAulas.map(a => `<option value="${a.id}">${a.grado_seccion}</option>`).join('');

                // Map real alumnos from database
                allStudents = (dataAlumnos.alumnos || []).map(a => ({
                    id: a.id,
                    dni: a.dni || '--',
                    nombre: a.nombre || '--',
                    apellido: a.apellido || '',
                    aula_id: a.aula_id,
                    grado_seccion: a.grado_seccion || 'Sin aula',
                    puntos: a.puntos || 0
                }));

                renderTable(allStudents);
            } catch (err) {
                console.error('Load error:', err);
            }
        }

        function renderTable(students) {
            const body = document.getElementById('students-body');
            document.getElementById('total-label').textContent = `${students.length} students`;

            if (students.length === 0) {
                body.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:2rem;">No students found</td></tr>';
                return;
            }

            body.innerHTML = students.map(s => `
                <tr>
                    <td>${s.dni || '--'}</td>
                    <td>${s.nombre}</td>
                    <td>${s.apellido}</td>
                    <td>${s.grado_seccion}</td>
                    <td><strong>${s.puntos || 0}</strong> pts</td>
                    <td>
                        <div class="table-actions">
                            <button class="action-btn edit" onclick="editStudent(${s.id})">Edit</button>
                            <button class="action-btn delete" onclick="deleteStudent(${s.id})">Delete</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function filterTable() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = allStudents.filter(s =>
                (s.dni || '').toLowerCase().includes(query) ||
                s.nombre.toLowerCase().includes(query) ||
                s.apellido.toLowerCase().includes(query)
            );
            renderTable(filtered);
        }

        function openModal(student = null) {
            document.getElementById('modal-overlay').classList.add('show');
            if (student) {
                document.getElementById('modal-title').textContent = 'EDIT STUDENT';
                document.getElementById('edit-id').value = student.id;
                document.getElementById('f-dni').value = student.dni || '';
                document.getElementById('f-nombre').value = student.nombre;
                document.getElementById('f-apellido').value = student.apellido;
            } else {
                document.getElementById('modal-title').textContent = 'REGISTER NEW STUDENT';
                document.getElementById('student-form').reset();
                document.getElementById('edit-id').value = '';
            }
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('show');
        }

        function editStudent(id) {
            const student = allStudents.find(s => s.id === id);
            if (student) openModal(student);
        }

        function deleteStudent(id) {
            if (confirm('Are you sure you want to remove this student?')) {
                allStudents = allStudents.filter(s => s.id !== id);
                renderTable(allStudents);
            }
        }

        function saveStudent(e) {
            e.preventDefault();
            const editId = document.getElementById('edit-id').value;
            const newStudent = {
                id: editId ? parseInt(editId) : Date.now(),
                dni: document.getElementById('f-dni').value,
                nombre: document.getElementById('f-nombre').value,
                apellido: document.getElementById('f-apellido').value,
                grado_seccion: document.getElementById('f-grado').selectedOptions[0]?.text || '--'
            };

            if (editId) {
                const idx = allStudents.findIndex(s => s.id === parseInt(editId));
                if (idx !== -1) allStudents[idx] = newStudent;
            } else {
                allStudents.unshift(newStudent);
            }

            renderTable(allStudents);
            closeModal();
            return false;
        }

        // Close modal on overlay click
        document.getElementById('modal-overlay').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeModal();
        });

        loadData();
    </script>
</body>
</html>
