<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Tutores - Eco-School High</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/administrador/gestion_tutores.css">
</head>
<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-logo">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 2,11.5 2,13.5C2,15.5 3.75,17.25 3.75,17.25C7,8 17,8 17,8Z"/></svg>
                <span>ECO-SCHOOL</span>
            </div>
            <a href="dashboard.html" class="sidebar-link"><span class="sidebar-icon">&#9632;</span> Global Dashboard</a>
            <a href="gestion_alumnos.html" class="sidebar-link"><span class="sidebar-icon">&#128101;</span> Manage Students</a>
            <a href="gestion_tutores.html" class="sidebar-link active"><span class="sidebar-icon">&#128188;</span> Assign Tutors</a>
            <a href="auditoria_docente.html" class="sidebar-link"><span class="sidebar-icon">&#128203;</span> Teacher Audit Log</a>
            <div style="margin-top: auto; padding-top: 2rem;">
                <a href="#" onclick="cerrarSesion(); return false;" class="sidebar-link" style="color: #ef9a9a;"><span class="sidebar-icon">&#9211;</span> Cerrar Sesión</a>
            </div>
        </nav>

        <main class="admin-main">
            <div class="page-header">
                <h2>Assign Tutors</h2>
                <button class="btn btn-primary" onclick="openModal()">+ Assign New Tutor</button>
            </div>

            <!-- Tutors Table -->
            <div class="crud-card glass-card-static">
                <div class="table-wrapper">
                    <table class="crud-table">
                        <thead>
                            <tr>
                                <th>DNI</th>
                                <th>Nombre</th>
                                <th>Apellido</th>
                                <th>Aula Asignada</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tutors-body">
                            <tr><td colspan="5" style="text-align:center; padding:2rem; color:var(--eco-text-muted);">Cargando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Unassigned Classrooms -->
            <h3 style="margin: 2rem 0 1rem; font-size: 1.1rem;">Classrooms Overview</h3>
            <div class="tutors-grid" id="classrooms-grid">
                <div style="color: var(--eco-text-muted); padding: 2rem; text-align: center;">Cargando...</div>
            </div>
        </main>
    </div>

    <!-- Modal: Crear / Editar Docente -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div class="modal-title" id="modal-title">REGISTRAR DOCENTE</div>
            <form id="tutor-form">
                <input type="hidden" id="edit-id" value="">
                <div class="form-group">
                    <label for="f-dni">DNI</label>
                    <input type="text" id="f-dni" class="form-input" placeholder="DNI" required maxlength="10">
                </div>
                <div class="form-group">
                    <label for="f-nombre">Nombre</label>
                    <input type="text" id="f-nombre" class="form-input" placeholder="Nombre" required>
                </div>
                <div class="form-group">
                    <label for="f-apellido">Apellido</label>
                    <input type="text" id="f-apellido" class="form-input" placeholder="Apellido" required>
                </div>
                <div class="form-group">
                    <label for="f-aula">Aula Asignada</label>
                    <select id="f-aula" class="form-input" required>
                        <option value="">Seleccionar aula...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="f-contrasena">Contrase&ntilde;a <span id="pwd-hint" style="font-size:0.75rem;color:var(--eco-text-muted);font-weight:400;">(obligatoria para nuevo docente)</span></label>
                    <input type="password" id="f-contrasena" class="form-input" placeholder="Contrase&ntilde;a" autocomplete="new-password">
                    <small style="color:var(--eco-text-muted);font-size:0.75rem;">Dejar en blanco al editar para conservar la actual.</small>
                </div>
                <div id="form-error" style="display:none;padding:0.5rem 0.75rem;background:#ffebee;color:#c62828;border-radius:6px;font-size:0.82rem;margin-bottom:0.5rem;"></div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar Docente</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../assets/js/config.js"></script>
    <script>
        // Session verification
        const user = JSON.parse(sessionStorage.getItem('eco_user') || localStorage.getItem('eco_user') || '{}');
        if (!user.usuario_id || user.rol !== 'director') {
            window.location.href = '../index.html';
        }

        function cerrarSesion() {
            sessionStorage.clear();
            localStorage.removeItem('eco_user');
            window.location.href = '../index.html';
        }

        let allTutors = [];
        let allAulas = [];

        async function loadData() {
            try {
                const [resDocentes, resDirector] = await Promise.all([
                    fetch(`${CONFIG.API_BASE_URL}/api/admin/docentes`),
                    fetch(`${CONFIG.API_BASE_URL}/api/dashboard/director`)
                ]);
                const dataDocentes = await resDocentes.json();
                const dataDirector = await resDirector.json();

                allAulas = dataDirector.ranking_aulas || [];

                const select = document.getElementById('f-aula');
                select.innerHTML = '<option value="">Seleccionar aula...</option>' +
                    allAulas.map(a => `<option value="${a.id}">${a.grado_seccion}</option>`).join('');

                allTutors = (dataDocentes.docentes || []).map(d => ({
                    id: d.id,
                    dni: d.dni || '--',
                    nombre: d.nombre || '--',
                    apellido: d.apellido || '',
                    aula: d.grado_seccion || 'Sin aula',
                    aula_id: d.aula_id,
                    assigned: !!d.aula_id
                }));

                renderTutorsTable();
                renderClassrooms();
            } catch (err) {
                console.error('Load error:', err);
            }
        }

        function renderTutorsTable() {
            const body = document.getElementById('tutors-body');
            if (allTutors.length === 0) {
                body.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:2rem;">No hay docentes registrados</td></tr>';
                return;
            }
            body.innerHTML = allTutors.map(t => `
                <tr>
                    <td>${t.dni}</td>
                    <td><strong>${t.nombre}</strong></td>
                    <td>${t.apellido}</td>
                    <td>${t.aula}</td>
                    <td><span class="status-badge ${t.assigned ? 'active' : 'unassigned'}">${t.assigned ? 'Activo' : 'Sin aula'}</span></td>
                    <td>
                        <div class="table-actions" style="display:flex;gap:0.4rem;">
                            <button class="action-btn reassign" onclick="editDocente(${t.id})">Editar</button>
                            <button class="action-btn remove" onclick="deleteDocente(${t.id})">Eliminar</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function renderClassrooms() {
            const grid = document.getElementById('classrooms-grid');
            grid.innerHTML = allAulas.map(a => {
                const tutor = allTutors.find(t => t.aula_id === a.id);
                return `
                    <div class="tutor-card glass-card-static">
                        <div class="tutor-avatar">&#127979;</div>
                        <div class="tutor-info">
                            <div class="tutor-name">${a.grado_seccion}</div>
                            <div class="tutor-aula">${tutor ? tutor.nombre + ' ' + tutor.apellido : 'Sin docente asignado'}</div>
                            <div class="tutor-aula">Puntos: ${a.puntos_totales || 0}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openModal(docente = null) {
            document.getElementById('modal-overlay').classList.add('show');
            document.getElementById('form-error').style.display = 'none';
            const pwdInput = document.getElementById('f-contrasena');
            const pwdHint  = document.getElementById('pwd-hint');
            if (docente) {
                document.getElementById('modal-title').textContent = 'EDITAR DOCENTE';
                document.getElementById('edit-id').value = docente.id;
                document.getElementById('f-dni').value = docente.dni;
                document.getElementById('f-dni').readOnly = true;
                document.getElementById('f-nombre').value = docente.nombre;
                document.getElementById('f-apellido').value = docente.apellido;
                document.getElementById('f-aula').value = docente.aula_id || '';
                pwdInput.required = false;
                pwdInput.value = '';
                pwdHint.textContent = '(dejar en blanco para conservar la actual)';
            } else {
                document.getElementById('modal-title').textContent = 'REGISTRAR DOCENTE';
                document.getElementById('tutor-form').reset();
                document.getElementById('edit-id').value = '';
                document.getElementById('f-dni').readOnly = false;
                pwdInput.required = true;
                pwdHint.textContent = '(obligatoria para nuevo docente)';
            }
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('show');
        }

        function editDocente(id) {
            const docente = allTutors.find(t => t.id === id);
            if (docente) openModal(docente);
        }

        async function deleteDocente(id) {
            if (!confirm('\u00bfEliminar este docente? Esta acci\u00f3n no se puede deshacer.')) return;
            try {
                const res = await fetch(`${CONFIG.API_BASE_URL}/api/admin/docentes/${id}`, { method: 'DELETE' });
                if (!res.ok) {
                    const err = await res.json();
                    alert('Error: ' + (err.detail || 'No se pudo eliminar.'));
                    return;
                }
                allTutors = allTutors.filter(t => t.id !== id);
                renderTutorsTable();
                renderClassrooms();
            } catch (err) {
                alert('Error de red: ' + err.message);
            }
        }

        async function saveTutor(e) {
            const editId     = document.getElementById('edit-id').value;
            const dni        = document.getElementById('f-dni').value.trim();
            const nombre     = document.getElementById('f-nombre').value.trim();
            const apellido   = document.getElementById('f-apellido').value.trim();
            const aula_id    = document.getElementById('f-aula').value;
            const contrasena = document.getElementById('f-contrasena').value;
            const errorBox   = document.getElementById('form-error');

            errorBox.style.display = 'none';

            if (!editId && !contrasena) {
                errorBox.textContent = 'La contrase\u00f1a es obligatoria para nuevos docentes.';
                errorBox.style.display = 'block';
                return;
            }

            const formData = new FormData();
            formData.append('nombre', nombre);
            formData.append('apellido', apellido);
            formData.append('aula_id', aula_id);
            if (contrasena) formData.append('contrasena_hash', contrasena);

            try {
                let res;
                if (editId) {
                    res = await fetch(`${CONFIG.API_BASE_URL}/api/admin/docentes/${editId}`, {
                        method: 'PUT', body: formData
                    });
                } else {
                    formData.append('dni', dni);
                    res = await fetch(`${CONFIG.API_BASE_URL}/api/admin/docentes`, {
                        method: 'POST', body: formData
                    });
                }
                if (!res.ok) {
                    const err = await res.json();
                    errorBox.textContent = 'Error: ' + (err.detail || 'No se pudo guardar.');
                    errorBox.style.display = 'block';
                    return;
                }
                await loadData();
                closeModal();
            } catch (err) {
                errorBox.textContent = 'Error de red: ' + err.message;
                errorBox.style.display = 'block';
            }
        }

        // Submit con addEventListener (evita el bug de async con onsubmit inline)
        document.getElementById('tutor-form').addEventListener('submit', (e) => {
            e.preventDefault();
            saveTutor(e);
        });

        // Close modal on overlay click
        document.getElementById('modal-overlay').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeModal();
        });

        loadData();
    </script>
</body>
</html>
