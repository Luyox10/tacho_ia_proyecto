<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Competencia Inter-Aulas - Eco-School High</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/docente/competencia_aulas.css">
</head>
<body>
    <div class="page-wrapper">
        <div class="page-header">
            <h1>Competencia Inter-Aulas</h1>
            <div class="nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="competencia_aulas.html" class="active">Competencia</a>
                <a href="reporte_aula.html">Reporte</a>
            </div>
        </div>

        <!-- My Aula Banner -->
        <div class="my-aula-banner" id="my-aula-banner">
            <div>
                <div class="aula-name" id="my-aula-name">Cargando...</div>
                <div style="font-size: 0.8rem; opacity:0.8;">Tu aula asignada</div>
            </div>
            <div class="aula-stats">
                <div class="stat">
                    <div class="stat-value" id="my-aula-pos">--</div>
                    <div class="stat-label">Posicion</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="my-aula-pts">0</div>
                    <div class="stat-label">Puntos</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="my-aula-students">0</div>
                    <div class="stat-label">Alumnos</div>
                </div>
            </div>
        </div>

        <!-- All Aulas Grid -->
        <div class="aulas-grid" id="aulas-grid">
            <div style="grid-column: 1/-1; text-align: center; padding: 2rem; color: var(--eco-text-muted);">Cargando aulas...</div>
        </div>
    </div>

    <script src="../assets/js/config.js"></script>
    <script>
        // Session verification
        const user = JSON.parse(sessionStorage.getItem('eco_user') || localStorage.getItem('eco_user') || '{}');
        if (!user.usuario_id || user.rol !== 'docente') {
            window.location.href = '../index.html';
        }

        async function loadCompetencia() {
            try {
                const res = await fetch(`${CONFIG.API_BASE_URL}/api/dashboard/docente/${user.usuario_id}`);
                const data = await res.json();

                const aula = data.aula || {};
                const posicion = data.posicion_ranking || '--';
                const totalAlumnos = (data.alumnos || []).length;

                // My aula banner
                document.getElementById('my-aula-name').textContent = aula.grado_seccion || '--';
                document.getElementById('my-aula-pos').textContent = `#${posicion}`;
                document.getElementById('my-aula-pts').textContent = aula.puntos_totales || 0;
                document.getElementById('my-aula-students').textContent = totalAlumnos;

                // Fetch all aulas ranking
                const resDir = await fetch(`${CONFIG.API_BASE_URL}/api/dashboard/director`);
                const dirData = await resDir.json();
                const allAulas = dirData.ranking_aulas || [];

                renderAulasGrid(allAulas, aula.id);

            } catch (err) {
                console.error('Competencia load error:', err);
            }
        }

        function renderAulasGrid(aulas, myAulaId) {
            const grid = document.getElementById('aulas-grid');
            const maxPts = Math.max(...aulas.map(a => a.puntos_totales || 0), 1);

            grid.innerHTML = aulas.map((a, i) => {
                const isHighlighted = a.id === myAulaId ? 'highlighted' : '';
                const badgeClass = i === 0 ? 'top-1' : i === 1 ? 'top-2' : i === 2 ? 'top-3' : 'other';
                const pct = maxPts > 0 ? ((a.puntos_totales || 0) / maxPts * 100) : 0;
                return `
                    <div class="aula-card ${isHighlighted}">
                        <span class="aula-rank-badge ${badgeClass}">${i + 1}</span>
                        <div class="aula-card-name">${a.grado_seccion}</div>
                        <div class="aula-card-points">${a.puntos_totales || 0} puntos</div>
                        <div class="aula-progress">
                            <div class="aula-progress-fill" style="width: ${pct}%;"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        loadCompetencia();
    </script>
</body>
</html>
