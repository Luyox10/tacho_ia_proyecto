<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Global - Eco-School High</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/estudiante/ranking.css">
</head>
<body>
    <div class="page-wrapper">
        <div class="page-nav">
            <h1>Ranking Global de Aulas</h1>
            <div class="nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="medallas.html">Medallas</a>
                <a href="ranking.html" class="active">Ranking</a>
                <a href="cultura_ambiental.html">Tips</a>
            </div>
        </div>

        <!-- Podium -->
        <div class="podium-section glass-card-static" id="podium-section" style="display:none;">
            <div class="podium-item silver" id="podium-2">
                <div class="podium-avatar">&#127944;</div>
                <div class="podium-name">--</div>
                <div class="podium-points">0 pts</div>
                <div class="podium-bar"></div>
            </div>
            <div class="podium-item gold" id="podium-1">
                <div class="podium-avatar">&#127942;</div>
                <div class="podium-name">--</div>
                <div class="podium-points">0 pts</div>
                <div class="podium-bar"></div>
            </div>
            <div class="podium-item bronze" id="podium-3">
                <div class="podium-avatar">&#127941;</div>
                <div class="podium-name">--</div>
                <div class="podium-points">0 pts</div>
                <div class="podium-bar"></div>
            </div>
        </div>

        <!-- Full Ranking Table -->
        <div class="ranking-card glass-card-static">
            <table class="ranking-table">
                <thead>
                    <tr>
                        <th>Pos</th>
                        <th>Aula</th>
                        <th>Puntos</th>
                        <th>Progreso</th>
                    </tr>
                </thead>
                <tbody id="ranking-body">
                    <tr><td colspan="4" style="text-align:center; padding:2rem; color:var(--eco-text-muted);">Cargando ranking...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="../assets/js/config.js"></script>
    <script>
        // Session verification
        const user = JSON.parse(sessionStorage.getItem('eco_user') || localStorage.getItem('eco_user') || '{}');
        if (!user.usuario_id) {
            window.location.href = '../index.html';
        }

        async function loadRanking() {
            try {
                const res = await fetch(`${CONFIG.API_BASE_URL}/api/dashboard/director`);
                const data = await res.json();
                const aulas = data.ranking_aulas || [];

                if (aulas.length === 0) {
                    document.getElementById('ranking-body').innerHTML =
                        '<tr><td colspan="4" style="text-align:center; padding:2rem;">No hay aulas registradas.</td></tr>';
                    return;
                }

                const maxPts = Math.max(...aulas.map(a => a.puntos_totales || 0), 1);

                // Podium (top 3)
                if (aulas.length >= 3) {
                    document.getElementById('podium-section').style.display = 'flex';
                    const podiumOrder = [1, 0, 2]; // silver, gold, bronze display
                    ['podium-2', 'podium-1', 'podium-3'].forEach((id, idx) => {
                        const a = aulas[podiumOrder[idx]];
                        if (a) {
                            const el = document.getElementById(id);
                            el.querySelector('.podium-name').textContent = a.grado_seccion;
                            el.querySelector('.podium-points').textContent = `${a.puntos_totales || 0} pts`;
                        }
                    });
                }

                // Full table
                const body = document.getElementById('ranking-body');
                body.innerHTML = aulas.map((a, i) => {
                    const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'rank-other';
                    const isMyAula = user.aula_id === a.id ? 'my-aula' : '';
                    const pctWidth = maxPts > 0 ? ((a.puntos_totales || 0) / maxPts * 100) : 0;
                    return `
                        <tr class="${isMyAula}">
                            <td><span class="rank-num ${rankClass}">${i + 1}</span></td>
                            <td><strong>${a.grado_seccion}</strong>${isMyAula ? ' (Tu aula)' : ''}</td>
                            <td>${a.puntos_totales || 0} pts</td>
                            <td>
                                <div class="progress-bar-container">
                                    <div class="progress-bar-fill" style="width: ${pctWidth}%;"></div>
                                </div>
                            </td>
                        </tr>
                    `;
                }).join('');

            } catch (err) {
                console.error('Ranking load error:', err);
            }
        }

        loadRanking();
    </script>
</body>
</html>
