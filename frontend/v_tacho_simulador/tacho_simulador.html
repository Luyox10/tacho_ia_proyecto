<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tacho Simulador - Eco-School High</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <style>
        .simulator-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        .simulator-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .simulator-header-icon {
            width: 44px;
            height: 44px;
            background: var(--eco-primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .simulator-header-icon svg {
            width: 24px;
            height: 24px;
            fill: #fff;
        }

        .simulator-header h2 {
            margin: 0;
            color: var(--eco-primary-dark);
        }

        .simulator-header h2 span {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--eco-text-muted);
        }

        .simulator-container {
            width: 100%;
            max-width: 520px;
        }

        .step-card {
            padding: 2rem;
            margin-bottom: 1.5rem;
        }

        .step-indicator {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--eco-primary);
            margin-bottom: 1rem;
        }

        .step-indicator .step-num {
            width: 24px;
            height: 24px;
            background: var(--eco-primary);
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
        }

        .dni-verified {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            background: var(--eco-success-light);
            border-radius: var(--eco-radius-sm);
            margin-top: 1rem;
        }

        .dni-verified .check-icon {
            width: 28px;
            height: 28px;
            background: var(--eco-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .dni-verified-info {
            font-size: 0.85rem;
            color: var(--eco-primary-dark);
            font-weight: 600;
        }

        .dni-verified-info span {
            display: block;
            font-weight: 400;
            color: var(--eco-text-muted);
            font-size: 0.8rem;
        }

        /* Webcam section */
        .webcam-section {
            display: none;
        }

        .webcam-section.visible {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        .capture-btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: #fff;
            border: 4px solid var(--eco-primary);
            cursor: pointer;
            transition: var(--eco-transition);
            position: relative;
        }

        .capture-btn::after {
            content: '';
            position: absolute;
            inset: 6px;
            background: var(--eco-primary);
            border-radius: 50%;
            transition: var(--eco-transition);
        }

        .capture-btn:hover {
            transform: scale(1.1);
            border-color: var(--eco-primary-dark);
        }

        .capture-btn:hover::after {
            background: var(--eco-primary-dark);
        }

        .retake-btn {
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.9);
            border: 1.5px solid #ddd;
            border-radius: var(--eco-radius-sm);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            color: var(--eco-text);
            transition: var(--eco-transition);
        }

        .retake-btn:hover {
            background: #fff;
            border-color: var(--eco-primary);
            color: var(--eco-primary);
        }

        /* Result section */
        .result-section {
            display: none;
            text-align: center;
            padding: 2rem;
        }

        .result-section.visible {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        .result-category {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--eco-primary);
            margin-bottom: 0.5rem;
        }

        .result-confidence {
            font-size: 0.9rem;
            color: var(--eco-text-muted);
            margin-bottom: 1.5rem;
        }

        .result-actions {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .back-link {
            display: inline-block;
            margin-top: 2rem;
            font-size: 0.85rem;
            color: var(--eco-text-muted);
        }

        .back-link:hover {
            color: var(--eco-primary);
        }

        /* Loading spinner */
        .spinner {
            display: none;
            width: 40px;
            height: 40px;
            border: 4px solid #e0e0e0;
            border-top-color: var(--eco-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 1rem auto;
        }

        .spinner.visible {
            display: block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="simulator-page">
        <!-- Header -->
        <div class="simulator-header">
            <div class="simulator-header-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 2,11.5 2,13.5C2,15.5 3.75,17.25 3.75,17.25C7,8 17,8 17,8Z"/>
                </svg>
            </div>
            <h2>Tacho Simulador<span>Clasificacion de residuos con IA</span></h2>
        </div>

        <!-- Alert -->
        <div id="sim-alert" class="alert" style="max-width: 520px; width: 100%;" role="alert">
            <span id="sim-alert-icon"></span>
            <span id="sim-alert-message"></span>
        </div>

        <div class="simulator-container">
            <!-- Step 1: DNI Verification -->
            <div id="step-dni" class="step-card glass-card-static">
                <div class="step-indicator">
                    <span class="step-num">1</span> Verificacion de Estudiante
                </div>
                <form id="form-dni" onsubmit="return verificarDNI(event)">
                    <div class="form-group">
                        <label for="sim-dni">DNI del Estudiante</label>
                        <input type="text" id="sim-dni" class="form-input" placeholder="Ingrese DNI para verificar" required maxlength="10" autocomplete="off">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Verificar DNI</button>
                </form>
                <div id="dni-result" class="dni-verified" style="display: none;">
                    <div class="check-icon">&check;</div>
                    <div class="dni-verified-info">
                        <span id="student-name">--</span>
                        <span id="student-aula">--</span>
                    </div>
                </div>
            </div>

            <!-- Step 2: Webcam Capture -->
            <div id="step-webcam" class="webcam-section">
                <div class="step-card glass-card-static">
                    <div class="step-indicator">
                        <span class="step-num">2</span> Capturar Residuo
                    </div>
                    <p style="font-size: 0.85rem; margin-bottom: 1rem;">Coloque el residuo frente a la camara y presione el boton para capturar.</p>
                    <div class="webcam-container">
                        <video id="webcam-video" autoplay playsinline></video>
                        <canvas id="webcam-canvas" style="display: none;"></canvas>
                        <div class="webcam-overlay">
                            <button id="btn-capture" class="capture-btn" title="Capturar foto"></button>
                            <button id="btn-retake" class="retake-btn" style="display: none;">Retomar</button>
                        </div>
                    </div>
                    <div class="spinner" id="classify-spinner"></div>
                    <div style="text-align: center; margin-top: 1rem;">
                        <button id="btn-send" class="btn btn-primary" style="display: none;">Enviar para Clasificar</button>
                    </div>
                </div>
            </div>

            <!-- Step 3: Result -->
            <div id="step-result" class="result-section glass-card-static">
                <div class="step-indicator" style="justify-content: center;">
                    <span class="step-num">3</span> Resultado
                </div>
                <div class="result-category" id="result-category">--</div>
                <div class="result-confidence" id="result-confidence">--</div>
                <div id="result-alert" class="alert alert-success show" style="justify-content: center;">
                    <span>Residuo registrado correctamente</span>
                </div>
                <div class="result-actions">
                    <button class="btn btn-primary" onclick="resetSimulator()">Clasificar otro</button>
                    <a href="../index.html" class="btn btn-secondary">Volver al inicio</a>
                </div>
            </div>
        </div>

        <a href="../index.html" class="back-link">&larr; Volver al Login</a>
    </div>

    <script src="../assets/js/config.js"></script>
    <script src="app_simulador.js"></script>
</body>
</html>
